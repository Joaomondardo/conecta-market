version: '3.9'

services:
  # ── Bancos de Dados ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: conecta_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-conecta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-conecta123}
      POSTGRES_DB: ${POSTGRES_DB:-conecta_market}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-conecta}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: conecta_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-conecta}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-conecta123}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-conecta_logs}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: conecta_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-conecta123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-conecta123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Aplicações ───────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: conecta_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-conecta}:${POSTGRES_PASSWORD:-conecta123}@postgres:5432/${POSTGRES_DB:-conecta_market}
      MONGODB_URI: mongodb://${MONGO_USER:-conecta}:${MONGO_PASSWORD:-conecta123}@mongodb:27017/${MONGO_DB:-conecta_logs}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-conecta123}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super-secret-refresh-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      UPLOAD_DIR: /app/uploads
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: conecta_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_APP_NAME: Conecta Market
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ── Ferramentas de Administração (opcional) ─────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: conecta_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@conecta.market}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  uploads_data:

networks:
  default:
    name: conecta_network
